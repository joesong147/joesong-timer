<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joesong Timer - Operator</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <h1 class="app-title">⏱️ Joesong Timer</h1>
            </div>
            <div class="header-center">
                <div class="current-time" id="currentTime">--:--:--</div>
            </div>
            <div class="header-right">
                <div class="connection-status">
                    <div class="status-indicator" id="statusIndicator"></div>
                    <span id="statusText">Waiting for Projector</span>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <div class="controls-section">
                <!-- Title Section -->
                <div class="input-group">
                    <label for="titleInput">Title</label>
                    <div class="input-wrapper">
                        <input type="text" id="titleInput" placeholder="Enter presentation title" maxlength="100">
                        <button class="btn btn-secondary" id="updateTitleBtn">Update</button>
                    </div>
                </div>

                <!-- Message Section -->
                <div class="input-group">
                    <label for="messageInput">Message</label>
                    <div class="input-wrapper">
                        <textarea id="messageInput" placeholder="Enter message" maxlength="250"></textarea>
                        <button class="btn btn-secondary" id="updateMessageBtn">Update</button>
                    </div>
                </div>

                <!-- Timer Duration Section -->
                <div class="input-group">
                    <label>Timer Duration</label>
                    <div class="time-inputs">
                        <div class="time-input">
                            <label for="hoursInput">Hours</label>
                            <input type="number" id="hoursInput" min="0" max="23" value="0">
                        </div>
                        <div class="time-input">
                            <label for="minutesInput">Minutes</label>
                            <input type="number" id="minutesInput" min="0" max="59" value="5">
                        </div>
                        <div class="time-input">
                            <label for="secondsInput">Seconds</label>
                            <input type="number" id="secondsInput" min="0" max="59" value="0">
                        </div>
                    </div>
                    <button class="btn btn-secondary" id="applyDurationBtn">Apply Duration</button>
                </div>

                <!-- Presets -->
                <div class="input-group">
                    <label>Quick Presets (minutes)</label>
                    <div class="presets">
                        <button class="btn btn-preset" data-minutes="5">5</button>
                        <button class="btn btn-preset" data-minutes="10">10</button>
                        <button class="btn btn-preset" data-minutes="15">15</button>
                        <button class="btn btn-preset" data-minutes="20">20</button>
                        <button class="btn btn-preset" data-minutes="30">30</button>
                        <button class="btn btn-preset" data-minutes="45">45</button>
                        <button class="btn btn-preset" data-minutes="60">60</button>
                    </div>
                </div>

                <!-- Alarm Settings -->
                <div class="input-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="alarmCheckbox" checked>
                        <span>Play alarm at zero</span>
                    </label>
                </div>

                <!-- Theme Selection -->
                <div class="input-group">
                    <label>Theme</label>
                    <div class="theme-buttons">
                        <button class="btn btn-theme" data-theme="dark">Dark</button>
                        <button class="btn btn-theme" data-theme="blue">Blue</button>
                        <button class="btn btn-theme" data-theme="green">Green</button>
                        <button class="btn btn-theme" data-theme="light">Light</button>
                    </div>
                </div>
            </div>

            <!-- Timer Display Section -->
            <aside class="preview-section">
                <div class="timer-display-container">
                    <h2>Preview</h2>
                    <div class="preview-projector">
                        <div class="projector-title" id="previewTitle">Enter title</div>
                        <div class="projector-timer" id="previewTimer">00:00:00</div>
                        <div class="projector-message" id="previewMessage">Enter message</div>
                    </div>
                </div>
            </aside>
        </main>

        <!-- Control Buttons -->
        <footer class="footer">
            <div class="button-group">
                <button class="btn btn-primary" id="startBtn">▶ Start</button>
                <button class="btn btn-primary" id="pauseBtn" style="display:none;">⏸ Pause</button>
                <button class="btn btn-secondary" id="stopBtn">⏹ Stop</button>
                <button class="btn btn-secondary" id="resetBtn">↻ Reset</button>
            </div>
            <div class="button-group">
                <button class="btn btn-accent" id="projectorBtn">📺 Open Projector</button>
                <button class="btn btn-accent" id="fullscreenBtn">⛶ Fullscreen</button>
            </div>
        </footer>
    </div>

    <!-- Audio for alarm -->
    <audio id="alarmAudio" src="sounds/bell.mp3"></audio>

    <!-- Scripts -->
    <script src="js/storage.js"></script>
    <script src="js/timer.js"></script>
    <script src="js/sync.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
