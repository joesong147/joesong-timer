<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Joesong Timer</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="panel">
    <h1>Joesong Timer</h1>

    <label>Title</label>
    <div class="row">
        <input id="titleInput" value="SUNDAY SERVICE">
        <button id="titleBtn">Update</button>
    </div>

    <label>Message</label>
    <div class="row">
        <input id="messageInput" value="Welcome">
        <button id="messageBtn">Update</button>
    </div>

    <label>Minutes</label>
    <div class="row">
        <input id="minutesInput" type="number" value="10" min="1">
        <button id="timeBtn">Apply</button>
    </div>

    <div class="controls">
        <button id="startBtn">▶ Start</button>
        <button id="pauseBtn">⏸ Pause</button>
        <button id="stopBtn">■ Stop</button>
        <button id="resetBtn">↺ Reset</button>
        <button id="projBtn">🖥 Open Projector</button>
    </div>

    <div id="status">Stopped</div>

    <hr>

    <div class="preview">
        <div id="pTitle"></div>
        <div id="pTimer"></div>
        <div id="pMsg"></div>
    </div>
</div>

<!-- 🔥 MAIN SCRIPT (UPDATED VERSION MUST BE USED) -->
<script src="script.js"></script>

</body>
</html>
